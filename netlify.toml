# ===================================================================
# EDUORBIT — NETLIFY PERFORMANCE CONFIGURATION
# ===================================================================
# This file optimizes headers, security, and asset caching for 100%
# Lighthouse scores and perfect PWA (Offline App) updates.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "upgrade-insecure-requests"

# Long-term caching for static assets (images, fonts)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files — NEVER cache (always serve fresh on refresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# data.js — NEVER cache (college/fee data changes frequently)
[[headers]]
  for = "/data.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# app.js, admin.js, etc — short cache (1 hour), revalidate on change
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# CSS files — short cache (1 hour)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service Worker - ALWAYS check for updates (DO NOT CACHE)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
